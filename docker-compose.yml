version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: async-pipeline-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: async_pipeline_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s

  app:
    build: .
    container_name: spring-async-pipeline
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/async_pipeline_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/data/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql-data: