# ===============================
# APPLICATION SETTINGS
# ===============================
spring.application.name=spring-async-data-pipeline
server.port=8080
server.servlet.context-path=/api

# ===============================
# DATASOURCE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/async_pipeline_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CACHE CONFIGURATION (Requirement #7)
# ===============================
spring.cache.type=simple
spring.cache.cache-names=dataCache
spring.cache.simple.max-entries=100

# Custom TTL Property (to be used in your CacheConfig Java class)
cache.ttl-minutes=30

# ===============================
# SECURITY CONFIGURATION (Requirement #3)
# ===============================
spring.security.user.name=admin
spring.security.user.password=admin123

# ===============================
# LOGGING & CUSTOM PROPERTIES
# ===============================
logging.level.root=INFO
logging.level.com.asyncpipeline=DEBUG

# Custom Queue/Async Properties (Requirement #6)
queue.thread-pool-size=5
queue.webhook-url=https://webhook.site/b8a5e669-12b1-4c49-a259-9a24d754d229